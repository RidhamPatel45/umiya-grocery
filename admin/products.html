<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manage Products – Umiya Admin</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛠️</text></svg>">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    :root{--red:#b71c1c;--red2:#e53935;--gold:#fbc02d;--grad:linear-gradient(135deg,#b71c1c,#e53935);--sidebar:#1a1a2e;--text:#333;--bg:#f0f2f5;--card:#fff;--shadow:0 4px 20px rgba(0,0,0,0.08)}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh}

    .sidebar{width:250px;background:var(--sidebar);display:flex;flex-direction:column;min-height:100vh;flex-shrink:0;position:fixed;left:0;top:0;bottom:0;z-index:100}
    .sidebar-logo{padding:1.5rem;border-bottom:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;gap:0.75rem}
    .sidebar-logo .emoji{font-size:2rem}
    .sidebar-logo .name{color:white;font-weight:800;font-size:1rem;line-height:1.2}
    .sidebar-logo .sub{color:rgba(255,255,255,0.5);font-size:0.75rem}
    .nav-section{padding:1rem 0}
    .nav-label{padding:0.4rem 1.5rem;color:rgba(255,255,255,0.35);font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em}
    .nav-link{display:flex;align-items:center;gap:0.75rem;padding:0.75rem 1.5rem;color:rgba(255,255,255,0.7);text-decoration:none;font-size:0.9rem;font-weight:500;transition:all 0.2s;border-left:3px solid transparent}
    .nav-link:hover,.nav-link.active{background:rgba(255,255,255,0.08);color:white;border-left-color:var(--gold)}
    .nav-link .icon{font-size:1.1rem;width:20px;text-align:center}
    .sidebar-footer{margin-top:auto;padding:1rem 1.5rem;border-top:1px solid rgba(255,255,255,0.1)}
    .admin-name{color:white;font-weight:600;font-size:0.9rem}
    .admin-role{color:rgba(255,255,255,0.5);font-size:0.75rem}
    .logout-btn{display:flex;align-items:center;gap:0.5rem;margin-top:0.75rem;padding:0.6rem 0.75rem;background:rgba(255,255,255,0.08);border:none;color:rgba(255,255,255,0.7);border-radius:8px;cursor:pointer;font-size:0.85rem;width:100%;transition:all 0.2s;font-family:inherit}
    .logout-btn:hover{background:rgba(255,255,255,0.15);color:white}

    .main{margin-left:250px;flex:1;padding:2rem}
    .top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;flex-wrap:wrap;gap:1rem}
    .page-title{font-size:1.6rem;font-weight:800}
    .page-title span{color:var(--red)}

    .layout{display:grid;grid-template-columns:380px 1fr;gap:1.5rem;align-items:start}
    .card{background:var(--card);border-radius:16px;box-shadow:var(--shadow);padding:1.5rem}
    .card-title{font-size:1rem;font-weight:700;margin-bottom:1.25rem;color:var(--text);display:flex;align-items:center;gap:0.5rem}

    /* Form */
    .form-group{margin-bottom:1rem}
    .form-group label{display:block;font-weight:600;font-size:0.82rem;color:#555;margin-bottom:0.35rem;text-transform:uppercase;letter-spacing:0.03em}
    .form-group input,.form-group select,.form-group textarea{width:100%;padding:0.7rem 0.9rem;border:2px solid #eee;border-radius:10px;font-size:0.9rem;font-family:inherit;transition:border-color 0.2s;outline:none;background:white}
    .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--red)}
    .form-group textarea{height:80px;resize:vertical}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem}
    
    .img-preview{width:100%;height:140px;background:#f5f5f5;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:0.85rem;color:#aaa;border:2px dashed #ddd;overflow:hidden;margin-bottom:0.75rem;position:relative}
    .img-preview img{width:100%;height:100%;object-fit:cover;border-radius:8px}
    .img-preview-text{text-align:center;padding:1rem}
    
    .upload-btn{display:flex;align-items:center;justify-content:center;gap:0.5rem;padding:0.6rem;border:2px dashed var(--red);border-radius:10px;cursor:pointer;color:var(--red);font-weight:600;font-size:0.85rem;transition:all 0.2s;background:transparent;width:100%;font-family:inherit}
    .upload-btn:hover{background:#fff0f0}
    #file-input{display:none}

    .submit-btn{width:100%;padding:0.85rem;background:var(--grad);color:white;border:none;border-radius:10px;font-size:0.95rem;font-weight:700;cursor:pointer;transition:all 0.2s;margin-top:0.5rem;font-family:inherit}
    .submit-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(183,28,28,0.3)}
    .submit-btn:disabled{opacity:0.6;cursor:not-allowed;transform:none}
    .cancel-btn{width:100%;padding:0.75rem;background:#f5f5f5;color:#555;border:none;border-radius:10px;font-size:0.95rem;font-weight:600;cursor:pointer;margin-top:0.5rem;font-family:inherit;transition:all 0.2s}
    .cancel-btn:hover{background:#eee}
    .form-msg{padding:0.6rem 0.9rem;border-radius:8px;font-size:0.85rem;font-weight:600;margin-top:0.5rem;display:none}
    .form-msg.error{background:#ffebee;color:var(--red);display:block}
    .form-msg.success{background:#e8f5e9;color:#1b5e20;display:block}

    /* Products table */
    .products-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:0.75rem}
    .search-input{padding:0.6rem 1rem;border:2px solid #eee;border-radius:10px;font-size:0.9rem;outline:none;width:240px;font-family:inherit;transition:border-color 0.2s}
    .search-input:focus{border-color:var(--red)}
    .products-count{font-size:0.85rem;color:#888;font-weight:500}

    .product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1rem}
    .product-item{background:white;border:2px solid #f0f0f0;border-radius:14px;overflow:hidden;transition:all 0.2s}
    .product-item:hover{border-color:#e0e0e0;box-shadow:0 4px 16px rgba(0,0,0,0.08)}
    .product-item.unavailable{opacity:0.6}
    .product-img{height:140px;background:#f5f5f5;overflow:hidden;position:relative}
    .product-img img{width:100%;height:100%;object-fit:cover}
    .product-img .no-img{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:2.5rem;background:linear-gradient(135deg,#ffebee,#fff8f8)}
    .product-badge-tag{position:absolute;top:8px;right:8px;background:var(--gold);color:#333;padding:0.2rem 0.6rem;border-radius:12px;font-size:0.7rem;font-weight:700}
    .product-body{padding:0.9rem}
    .product-name{font-weight:700;font-size:0.95rem;color:var(--text);margin-bottom:0.25rem}
    .product-category{font-size:0.75rem;color:#888;text-transform:capitalize;margin-bottom:0.4rem}
    .product-price{font-weight:800;color:var(--red);font-size:1rem}
    .product-unit{color:#aaa;font-size:0.75rem;margin-left:0.25rem}
    .product-actions{display:flex;gap:0.5rem;margin-top:0.75rem}
    .action-btn{flex:1;padding:0.5rem;border:none;border-radius:8px;cursor:pointer;font-size:0.8rem;font-weight:600;transition:all 0.2s;font-family:inherit}
    .action-btn.edit{background:#e3f2fd;color:#1565c0}
    .action-btn.edit:hover{background:#1565c0;color:white}
    .action-btn.delete{background:#ffebee;color:var(--red)}
    .action-btn.delete:hover{background:var(--red);color:white}
    .action-btn.toggle{background:#f3e5f5;color:#6a1b9a;font-size:0.75rem}
    .action-btn.toggle:hover{background:#6a1b9a;color:white}

    .loading{text-align:center;padding:3rem;color:#aaa}
    .loading .spin{font-size:2rem;animation:spin 1s linear infinite;display:block;margin-bottom:1rem}
    @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
    .empty-state{text-align:center;padding:3rem;color:#aaa}
    .empty-state .icon{font-size:3rem;margin-bottom:1rem}

    .filter-tabs{display:flex;gap:0.4rem;flex-wrap:wrap}
    .filter-tab{padding:0.4rem 0.8rem;border:2px solid #eee;border-radius:20px;font-size:0.78rem;font-weight:600;cursor:pointer;background:white;color:#666;transition:all 0.2s;font-family:inherit}
    .filter-tab.active,.filter-tab:hover{border-color:var(--red);background:#fff0f0;color:var(--red)}

    @media(max-width:1100px){.layout{grid-template-columns:1fr}.product-grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}}
    @media(max-width:768px){.sidebar{display:none}.main{margin-left:0;padding:1rem}}
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="emoji">🏪</div>
      <div><div class="name">Umiya Grocery</div><div class="sub">Admin Panel</div></div>
    </div>
    <nav class="nav-section">
      <div class="nav-label">Main</div>
      <a href="/admin/" class="nav-link"><span class="icon">📊</span> Dashboard</a>
      <a href="/admin/products.html" class="nav-link active"><span class="icon">📦</span> Products</a>
      <a href="/admin/orders.html" class="nav-link"><span class="icon">🛒</span> Orders</a>
      <div class="nav-label" style="margin-top:0.5rem">Store</div>
      <a href="/" class="nav-link" target="_blank"><span class="icon">🌐</span> View Shop</a>
    </nav>
    <div class="sidebar-footer">
      <div class="admin-name" id="admin-name">Admin</div>
      <div class="admin-role">Administrator</div>
      <button class="logout-btn" onclick="Auth.logout()">🚪 Logout</button>
    </div>
  </aside>

  <main class="main">
    <div class="top-bar">
      <div class="page-title">📦 <span>Product</span> Management</div>
    </div>

    <div class="layout">
      <!-- ADD / EDIT FORM -->
      <div class="card" id="product-form-card">
        <div class="card-title" id="form-title">➕ Add New Product</div>

        <!-- Image Preview -->
        <div class="img-preview" id="img-preview">
          <div class="img-preview-text">🖼️<br>Image preview</div>
        </div>
        <button class="upload-btn" onclick="document.getElementById('file-input').click()">📁 Upload Image from Device</button>
        <input type="file" id="file-input" accept="image/*" onchange="handleImageUpload(event)"/>
        
        <div class="form-group" style="margin-top:0.75rem">
          <label>Or paste Image URL</label>
          <input type="url" id="inp-image-url" placeholder="https://example.com/image.jpg" oninput="previewFromUrl(this.value)"/>
        </div>

        <div class="form-group">
          <label>Product Name *</label>
          <input type="text" id="inp-name" placeholder="e.g. Premium Toor Dal"/>
        </div>

        <div class="form-group">
          <label>Category *</label>
          <select id="inp-category">
            <option value="">Select category...</option>
            <option value="pulses">Pulses & Lentils</option>
            <option value="spices">Spices & Masalas</option>
            <option value="dryfruit">Dry Fruits & Nuts</option>
            <option value="oil">Cooking Oils</option>
            <option value="flour">Flour & Grains</option>
            <option value="tea">Tea & Coffee</option>
            <option value="snacks">Snacks & Namkeen</option>
            <option value="household">Household Items</option>
            <option value="personalhygiene">Personal Care</option>
          </select>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Price (₹) *</label>
            <input type="number" id="inp-price" placeholder="e.g. 120" min="0"/>
          </div>
          <div class="form-group">
            <label>Max Price (₹)</label>
            <input type="number" id="inp-maxprice" placeholder="e.g. 180" min="0"/>
          </div>
        </div>

        <div class="form-group">
          <label>Unit</label>
          <select id="inp-unit">
            <option value="per kg">per kg</option>
            <option value="per 500g">per 500g</option>
            <option value="per 250g">per 250g</option>
            <option value="per litre">per litre</option>
            <option value="per pack">per pack</option>
            <option value="per piece">per piece</option>
            <option value="per dozen">per dozen</option>
          </select>
        </div>

        <div class="form-group">
          <label>Badge Label</label>
          <select id="inp-badge">
            <option value="">No Badge</option>
            <option value="Best Seller">Best Seller</option>
            <option value="New">New</option>
            <option value="Premium">Premium</option>
            <option value="Popular">Popular</option>
            <option value="Organic">Organic</option>
            <option value="Healthy">Healthy</option>
            <option value="Sale">Sale</option>
          </select>
        </div>

        <div class="form-group">
          <label>Description</label>
          <textarea id="inp-description" placeholder="Brief product description..."></textarea>
        </div>

        <div class="form-group">
          <label>Features (comma separated)</label>
          <input type="text" id="inp-features" placeholder="e.g. Fresh Stock, Grade A, Machine Clean"/>
        </div>

        <button class="submit-btn" id="submit-btn" onclick="submitProduct()">➕ Add Product</button>
        <button class="cancel-btn" id="cancel-btn" style="display:none" onclick="cancelEdit()">Cancel Edit</button>
        <div class="form-msg" id="form-msg"></div>
      </div>

      <!-- PRODUCTS LIST -->
      <div class="card">
        <div class="products-header">
          <div class="card-title" style="margin:0">📋 All Products <span class="products-count" id="products-count"></span></div>
          <input type="text" class="search-input" id="search-input" placeholder="🔍 Search products..." oninput="filterProducts()"/>
        </div>

        <div class="filter-tabs" id="filter-tabs" style="margin-bottom:1rem">
          <button class="filter-tab active" onclick="setCategoryFilter('')" data-cat="">All</button>
          <button class="filter-tab" onclick="setCategoryFilter('pulses')" data-cat="pulses">Pulses</button>
          <button class="filter-tab" onclick="setCategoryFilter('spices')" data-cat="spices">Spices</button>
          <button class="filter-tab" onclick="setCategoryFilter('dryfruit')" data-cat="dryfruit">Dry Fruits</button>
          <button class="filter-tab" onclick="setCategoryFilter('oil')" data-cat="oil">Oils</button>
          <button class="filter-tab" onclick="setCategoryFilter('flour')" data-cat="flour">Flour</button>
          <button class="filter-tab" onclick="setCategoryFilter('tea')" data-cat="tea">Tea</button>
          <button class="filter-tab" onclick="setCategoryFilter('snacks')" data-cat="snacks">Snacks</button>
          <button class="filter-tab" onclick="setCategoryFilter('household')" data-cat="household">Household</button>
          <button class="filter-tab" onclick="setCategoryFilter('personalhygiene')" data-cat="personalhygiene">Personal Care</button>
        </div>

        <div id="products-container">
          <div class="loading"><span class="spin">⟳</span>Loading products...</div>
        </div>
      </div>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    Auth.requireAdmin();
    const user = Auth.getUser();
    if (user) document.getElementById('admin-name').textContent = user.name;

    let allProducts = [];
    let editingId = null;
    let currentImageBase64 = '';
    let categoryFilter = '';

    // ── Image Handling ──────────────────────────────────
    function handleImageUpload(event) {
      const file = event.target.files[0];
      if (!file) return;
      if (file.size > 3 * 1024 * 1024) { alert('Image too large. Please use image under 3MB.'); return; }
      const reader = new FileReader();
      reader.onload = function(e) {
        currentImageBase64 = e.target.result;
        document.getElementById('inp-image-url').value = '';
        showImagePreview(currentImageBase64);
      };
      reader.readAsDataURL(file);
    }

    function previewFromUrl(url) {
      if (url) {
        currentImageBase64 = '';
        showImagePreview(url);
      } else {
        resetPreview();
      }
    }

    function showImagePreview(src) {
      const p = document.getElementById('img-preview');
      p.innerHTML = `<img src="${src}" onerror="this.parentElement.innerHTML='<div class=\\'img-preview-text\\'>❌ Invalid image URL</div>'" alt="preview"/>`;
    }

    function resetPreview() {
      document.getElementById('img-preview').innerHTML = '<div class="img-preview-text">🖼️<br>Image preview</div>';
      currentImageBase64 = '';
      document.getElementById('inp-image-url').value = '';
      document.getElementById('file-input').value = '';
    }

    // ── Submit Product ─────────────────────────────────
    async function submitProduct() {
      const name = document.getElementById('inp-name').value.trim();
      const category = document.getElementById('inp-category').value;
      const price = parseFloat(document.getElementById('inp-price').value);
      const maxPrice = parseFloat(document.getElementById('inp-maxprice').value) || 0;
      const unit = document.getElementById('inp-unit').value;
      const badge = document.getElementById('inp-badge').value;
      const description = document.getElementById('inp-description').value.trim();
      const featuresRaw = document.getElementById('inp-features').value;
      const features = featuresRaw ? featuresRaw.split(',').map(f => f.trim()).filter(Boolean) : [];
      const imageUrl = document.getElementById('inp-image-url').value.trim();
      const image = currentImageBase64 || imageUrl;

      if (!name) { showFormMsg('❌ Product name is required', 'error'); return; }
      if (!category) { showFormMsg('❌ Please select a category', 'error'); return; }
      if (!price || price <= 0) { showFormMsg('❌ Please enter a valid price', 'error'); return; }

      const productData = { name, category, price, maxPrice, unit, badge, description, features, image, isAvailable: true };

      const btn = document.getElementById('submit-btn');
      btn.disabled = true; btn.textContent = 'Saving...';

      let result;
      if (editingId) {
        result = await ProductAPI.update(editingId, productData);
      } else {
        result = await ProductAPI.add(productData);
      }

      btn.disabled = false;
      btn.textContent = editingId ? '💾 Update Product' : '➕ Add Product';

      if (result.ok) {
        showFormMsg(editingId ? '✅ Product updated!' : '✅ Product added successfully!', 'success');
        resetForm();
        loadProducts();
      } else {
        showFormMsg('❌ ' + result.error, 'error');
      }
    }

    function showFormMsg(msg, type) {
      const el = document.getElementById('form-msg');
      el.textContent = msg;
      el.className = 'form-msg ' + type;
      setTimeout(() => { el.className = 'form-msg'; }, 4000);
    }

    function resetForm() {
      editingId = null;
      document.getElementById('form-title').textContent = '➕ Add New Product';
      document.getElementById('submit-btn').textContent = '➕ Add Product';
      document.getElementById('cancel-btn').style.display = 'none';
      ['inp-name','inp-price','inp-maxprice','inp-description','inp-features','inp-image-url'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('inp-category').value = '';
      document.getElementById('inp-unit').value = 'per kg';
      document.getElementById('inp-badge').value = '';
      document.getElementById('file-input').value = '';
      resetPreview();
    }

    function cancelEdit() { resetForm(); }

    // ── Edit Product ───────────────────────────────────
    function editProduct(p) {
      editingId = p._id;
      document.getElementById('form-title').textContent = '✏️ Edit Product';
      document.getElementById('submit-btn').textContent = '💾 Update Product';
      document.getElementById('cancel-btn').style.display = 'block';
      document.getElementById('inp-name').value = p.name;
      document.getElementById('inp-category').value = p.category;
      document.getElementById('inp-price').value = p.price;
      document.getElementById('inp-maxprice').value = p.maxPrice || '';
      document.getElementById('inp-unit').value = p.unit || 'per kg';
      document.getElementById('inp-badge').value = p.badge || '';
      document.getElementById('inp-description').value = p.description || '';
      document.getElementById('inp-features').value = (p.features || []).join(', ');
      if (p.image) {
        if (p.image.startsWith('data:')) { currentImageBase64 = p.image; showImagePreview(p.image); }
        else { document.getElementById('inp-image-url').value = p.image; showImagePreview(p.image); }
      } else { resetPreview(); }
      document.getElementById('product-form-card').scrollIntoView({ behavior: 'smooth' });
    }

    // ── Delete Product ─────────────────────────────────
    async function deleteProduct(id, name) {
      if (!confirm(`Delete "${name}"? This cannot be undone.`)) return;
      const result = await ProductAPI.delete(id);
      if (result.ok) loadProducts();
      else alert('Failed to delete: ' + result.error);
    }

    // ── Toggle Availability ────────────────────────────
    async function toggleAvailability(id, current) {
      await ProductAPI.update(id, { isAvailable: !current });
      loadProducts();
    }

    // ── Load & Render Products ─────────────────────────
    async function loadProducts() {
      const result = await ProductAPI.getAdmin();
      if (result.ok) {
        allProducts = result.data;
        renderProducts();
      }
    }

    function setCategoryFilter(cat) {
      categoryFilter = cat;
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.toggle('active', t.dataset.cat === cat));
      renderProducts();
    }

    function filterProducts() { renderProducts(); }

    function renderProducts() {
      const search = document.getElementById('search-input').value.toLowerCase();
      let filtered = allProducts;
      if (categoryFilter) filtered = filtered.filter(p => p.category === categoryFilter);
      if (search) filtered = filtered.filter(p => p.name.toLowerCase().includes(search) || (p.description || '').toLowerCase().includes(search));

      document.getElementById('products-count').textContent = `(${filtered.length})`;
      const container = document.getElementById('products-container');

      if (filtered.length === 0) {
        container.innerHTML = `<div class="empty-state"><div class="icon">📦</div><p>No products found.<br>Add your first product using the form!</p></div>`;
        return;
      }

      const catLabels = { pulses:'Pulses', spices:'Spices', dryfruit:'Dry Fruits', oil:'Oils', flour:'Flour', tea:'Tea & Coffee', snacks:'Snacks', household:'Household', personalhygiene:'Personal Care' };

      container.innerHTML = `<div class="product-grid">${filtered.map(p => `
        <div class="product-item ${p.isAvailable ? '' : 'unavailable'}">
          <div class="product-img">
            ${p.image ? `<img src="${p.image}" alt="${p.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
              <div class="no-img" style="display:none">🛍️</div>` : `<div class="no-img">🛍️</div>`}
            ${p.badge ? `<span class="product-badge-tag">${p.badge}</span>` : ''}
          </div>
          <div class="product-body">
            <div class="product-name">${p.name}</div>
            <div class="product-category">${catLabels[p.category] || p.category}</div>
            <div>
              <span class="product-price">₹${p.price}${p.maxPrice ? ' – ₹' + p.maxPrice : ''}</span>
              <span class="product-unit">${p.unit}</span>
            </div>
            <div class="product-actions">
              <button class="action-btn edit" onclick='editProduct(${JSON.stringify(p).replace(/'/g,"&apos;")})'>✏️ Edit</button>
              <button class="action-btn toggle" onclick="toggleAvailability('${p._id}', ${p.isAvailable})">${p.isAvailable ? '🔴 Hide' : '🟢 Show'}</button>
              <button class="action-btn delete" onclick="deleteProduct('${p._id}', '${p.name.replace(/'/g,"\\'")}')">🗑️</button>
            </div>
          </div>
        </div>`).join('')}
      </div>`;
    }

    loadProducts();
  </script>
</body>
</html>
