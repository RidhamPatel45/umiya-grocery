<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Orders – Umiya Admin</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛒</text></svg>">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    :root{--red:#b71c1c;--red2:#e53935;--gold:#fbc02d;--grad:linear-gradient(135deg,#b71c1c,#e53935);--sidebar:#1a1a2e;--text:#333;--bg:#f0f2f5;--card:#fff;--shadow:0 4px 20px rgba(0,0,0,0.08)}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh}
    .sidebar{width:250px;background:var(--sidebar);display:flex;flex-direction:column;min-height:100vh;flex-shrink:0;position:fixed;left:0;top:0;bottom:0;z-index:100}
    .sidebar-logo{padding:1.5rem;border-bottom:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;gap:0.75rem}
    .sidebar-logo .emoji{font-size:2rem}
    .sidebar-logo .name{color:white;font-weight:800;font-size:1rem;line-height:1.2}
    .sidebar-logo .sub{color:rgba(255,255,255,0.5);font-size:0.75rem}
    .nav-section{padding:1rem 0}
    .nav-label{padding:0.4rem 1.5rem;color:rgba(255,255,255,0.35);font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em}
    .nav-link{display:flex;align-items:center;gap:0.75rem;padding:0.75rem 1.5rem;color:rgba(255,255,255,0.7);text-decoration:none;font-size:0.9rem;font-weight:500;transition:all 0.2s;border-left:3px solid transparent}
    .nav-link:hover,.nav-link.active{background:rgba(255,255,255,0.08);color:white;border-left-color:var(--gold)}
    .sidebar-footer{margin-top:auto;padding:1rem 1.5rem;border-top:1px solid rgba(255,255,255,0.1)}
    .admin-name{color:white;font-weight:600;font-size:0.9rem}
    .admin-role{color:rgba(255,255,255,0.5);font-size:0.75rem}
    .logout-btn{display:flex;align-items:center;gap:0.5rem;margin-top:0.75rem;padding:0.6rem 0.75rem;background:rgba(255,255,255,0.08);border:none;color:rgba(255,255,255,0.7);border-radius:8px;cursor:pointer;font-size:0.85rem;width:100%;transition:all 0.2s;font-family:inherit}
    .logout-btn:hover{background:rgba(255,255,255,0.15);color:white}
    .main{margin-left:250px;flex:1;padding:2rem}
    .top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;flex-wrap:wrap;gap:1rem}
    .page-title{font-size:1.6rem;font-weight:800}.page-title span{color:var(--red)}
    .card{background:var(--card);border-radius:16px;box-shadow:var(--shadow);padding:1.5rem;margin-bottom:1.5rem}

    .filter-row{display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:1.25rem}
    .filter-btn{padding:0.45rem 1rem;border:2px solid #eee;border-radius:20px;font-size:0.82rem;font-weight:600;cursor:pointer;background:white;color:#666;transition:all 0.2s;font-family:inherit}
    .filter-btn.active,.filter-btn:hover{border-color:var(--red);background:#fff0f0;color:var(--red)}

    .orders-list{display:flex;flex-direction:column;gap:1rem}
    .order-card{background:white;border:2px solid #f0f0f0;border-radius:14px;overflow:hidden;transition:all 0.2s}
    .order-card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.08);border-color:#e0e0e0}
    .order-header{padding:1rem 1.25rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:0.5rem;border-bottom:1px solid #f5f5f5}
    .order-customer{font-weight:700;font-size:1rem}
    .order-phone{color:#666;font-size:0.85rem}
    .order-meta{display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap}
    .order-time{font-size:0.8rem;color:#aaa}
    .order-total{font-weight:800;color:var(--red);font-size:1.05rem}
    .badge{padding:0.3rem 0.8rem;border-radius:20px;font-size:0.75rem;font-weight:700;border:none;cursor:pointer;font-family:inherit}
    .badge.pending{background:#fff3e0;color:#e65100}
    .badge.confirmed{background:#e3f2fd;color:#1565c0}
    .badge.ready{background:#e8f5e9;color:#1b5e20}
    .badge.completed{background:#f3e5f5;color:#6a1b9a}
    .order-items{padding:0.75rem 1.25rem}
    .order-item-row{display:flex;justify-content:space-between;align-items:center;padding:0.4rem 0;border-bottom:1px solid #fafafa;font-size:0.88rem}
    .order-item-row:last-child{border-bottom:none}
    .item-name{font-weight:500}
    .item-qty{color:#666;font-size:0.82rem}
    .item-price{font-weight:700;color:var(--red)}
    .order-footer{padding:0.75rem 1.25rem;background:#fafafa;display:flex;gap:0.5rem;flex-wrap:wrap;align-items:center;border-top:1px solid #f0f0f0}
    .status-select{padding:0.45rem 0.75rem;border:2px solid #eee;border-radius:8px;font-size:0.82rem;font-family:inherit;cursor:pointer;outline:none}
    .status-select:focus{border-color:var(--red)}
    .wa-btn{padding:0.45rem 0.9rem;background:#25d366;color:white;border:none;border-radius:8px;font-size:0.82rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.2s}
    .wa-btn:hover{background:#1da851}
    .empty-state{text-align:center;padding:4rem;color:#aaa}
    .empty-state .icon{font-size:3rem;margin-bottom:1rem}
    .loading{text-align:center;padding:3rem;color:#aaa;font-size:0.9rem}
    @media(max-width:768px){.sidebar{display:none}.main{margin-left:0;padding:1rem}}
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="emoji">🏪</div>
      <div><div class="name">Umiya Grocery</div><div class="sub">Admin Panel</div></div>
    </div>
    <nav class="nav-section">
      <div class="nav-label">Main</div>
      <a href="/admin/" class="nav-link"><span>📊</span> Dashboard</a>
      <a href="/admin/products.html" class="nav-link"><span>📦</span> Products</a>
      <a href="/admin/orders.html" class="nav-link active"><span>🛒</span> Orders</a>
      <div class="nav-label" style="margin-top:0.5rem">Store</div>
      <a href="/" class="nav-link" target="_blank"><span>🌐</span> View Shop</a>
    </nav>
    <div class="sidebar-footer">
      <div class="admin-name" id="admin-name">Admin</div>
      <div class="admin-role">Administrator</div>
      <button class="logout-btn" onclick="Auth.logout()">🚪 Logout</button>
    </div>
  </aside>

  <main class="main">
    <div class="top-bar">
      <div class="page-title">🛒 Customer <span>Orders</span></div>
    </div>

    <div class="card">
      <div class="filter-row">
        <button class="filter-btn active" onclick="setFilter('')" data-f="">All Orders</button>
        <button class="filter-btn" onclick="setFilter('pending')" data-f="pending">⏳ Pending</button>
        <button class="filter-btn" onclick="setFilter('confirmed')" data-f="confirmed">✅ Confirmed</button>
        <button class="filter-btn" onclick="setFilter('ready')" data-f="ready">📦 Ready</button>
        <button class="filter-btn" onclick="setFilter('completed')" data-f="completed">✔️ Completed</button>
      </div>
      <div id="orders-list" class="orders-list">
        <div class="loading">⏳ Loading orders...</div>
      </div>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    Auth.requireAdmin();
    const user = Auth.getUser();
    if (user) document.getElementById('admin-name').textContent = user.name;

    let allOrders = [];
    let currentFilter = '';

    function setFilter(f) {
      currentFilter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.f === f));
      renderOrders();
    }

    async function loadOrders() {
      const result = await OrderAPI.getAll();
      if (result.ok) { allOrders = result.data; renderOrders(); }
      else document.getElementById('orders-list').innerHTML = '<div class="empty-state"><div class="icon">❌</div><p>Failed to load orders</p></div>';
    }

    function renderOrders() {
      const filtered = currentFilter ? allOrders.filter(o => o.status === currentFilter) : allOrders;
      const container = document.getElementById('orders-list');
      if (filtered.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="icon">🛒</div><p>No orders found</p></div>';
        return;
      }
      container.innerHTML = filtered.map(o => `
        <div class="order-card">
          <div class="order-header">
            <div>
              <div class="order-customer">👤 ${o.customerName}</div>
              <div class="order-phone">📞 ${o.customerPhone}</div>
            </div>
            <div class="order-meta">
              <div class="order-total">₹${o.totalAmount}</div>
              <span class="badge ${o.status}">${o.status}</span>
              <div class="order-time">${new Date(o.createdAt).toLocaleString('en-IN',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})}</div>
            </div>
          </div>
          <div class="order-items">
            ${o.items.map(item => `
              <div class="order-item-row">
                <span class="item-name">${item.name}</span>
                <span class="item-qty">x${item.quantity} ${item.unit || ''}</span>
                <span class="item-price">₹${item.subtotal || (item.price * item.quantity)}</span>
              </div>`).join('')}
          </div>
          <div class="order-footer">
            <select class="status-select" onchange="updateStatus('${o._id}', this.value)">
              <option value="pending" ${o.status==='pending'?'selected':''}>⏳ Pending</option>
              <option value="confirmed" ${o.status==='confirmed'?'selected':''}>✅ Confirmed</option>
              <option value="ready" ${o.status==='ready'?'selected':''}>📦 Ready for Pickup</option>
              <option value="completed" ${o.status==='completed'?'selected':''}>✔️ Completed</option>
            </select>
            <button class="wa-btn" onclick="replyWhatsApp('${o.customerPhone}', '${o.customerName}', ${o.totalAmount})">💬 Reply on WhatsApp</button>
          </div>
        </div>`).join('');
    }

    async function updateStatus(id, status) {
      const result = await OrderAPI.updateStatus(id, status);
      if (result.ok) loadOrders();
    }

    function replyWhatsApp(phone, name, total) {
      const msg = encodeURIComponent(`Hello ${name}! 👋\n\nYour order from Umiya Grocery (₹${total}) has been received.\n\n📦 Your order is ready for pickup at:\n📍 123 Market Street, Ahmedabad\n\nPickup Time: _____________\n\nThank you for shopping with us! 🙏`);
      window.open(`https://wa.me/91${phone.replace(/\D/g,'')}?text=${msg}`, '_blank');
    }

    loadOrders();
  </script>
</body>
</html>
